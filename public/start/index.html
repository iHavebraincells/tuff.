<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>court.larp | Authentication</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Inter, Arial, sans-serif;
    background:
        radial-gradient(circle at top, #6d28d9 0%, transparent 35%),
        #080808;
    color: white;
}

.container {
    width: 90%;
    max-width: 450px;
    background: rgba(25, 25, 25, 0.95);
    border: 1px solid rgba(138, 43, 226, .4);
    border-radius: 20px;
    padding: 45px 35px;
    text-align: center;
    box-shadow:
        0 0 40px rgba(138,43,226,.25),
        inset 0 0 20px rgba(255,255,255,.02);
    animation: fade .5s ease;
}

@keyframes fade {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logo {
    width: 70px;
    height: 70px;
    margin: auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg,#8a2be2,#c084fc);
    font-size: 35px;
    box-shadow: 0 0 25px rgba(138,43,226,.6);
}

h1 {
    margin-top: 25px;
    margin-bottom: 8px;
    font-size: 30px;
}

.subtitle {
    color: #aaa;
    font-size: 16px;
}

.status {
    margin-top: 25px;
    padding: 15px;
    border-radius: 12px;
    background: #111;
    color: #ddd;
}

button {
    width: 100%;
    margin-top: 25px;
    padding: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;

    font-size: 17px;
    font-weight: bold;
    color: white;

    background: linear-gradient(135deg,#8a2be2,#a855f7);
    box-shadow: 0 0 20px rgba(138,43,226,.4);

    transition: .25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(168,85,247,.7);
}

button:disabled {
    opacity: .6;
    cursor: not-allowed;
}

.success {
    display:none;
    margin-top:25px;
    padding:18px;
    border-radius:12px;
    background:#052e16;
    border:1px solid #22c55e;
    color:#4ade80;
}

.footer {
    margin-top:30px;
    color:#666;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">
        🔐
    </div>

    <h1>court.larp</h1>

    <p class="subtitle">
        Discord authentication portal
    </p>


    <div class="status" id="status">
        Waiting for verification...
    </div>


    <button id="verifyBtn" onclick="completeAuth()">
        ✅ Verify Account
    </button>


    <div class="success" id="successMsg">
        ✅ Authentication complete!<br><br>

        Return to Discord and type:

        <br><br>

        <strong>,step1 YOURCODE</strong>
    </div>


    <div class="footer">
        Secure authentication powered by court.larp
    </div>

</div>


<script>

let authCode = "";

// /start/CODE support
const path = window.location.pathname;

const parts = path.split("/start/");

if(parts.length > 1){
    authCode = parts[1];
}


// ?code=CODE support
if(!authCode){

    const params = new URLSearchParams(window.location.search);

    authCode = params.get("code") || "";

}


const status = document.getElementById("status");
const button = document.getElementById("verifyBtn");


if(!authCode){

    status.innerHTML = "❌ Invalid authentication link.";
    button.disabled = true;

}



async function completeAuth(){

    if(!authCode) return;


    button.disabled = true;
    button.innerHTML = "⏳ Verifying...";
    status.innerHTML = "Connecting to authentication server...";


    try{


        const response = await fetch(
            `https://achiness-myth-mummify.ngrok-free.dev/complete/${encodeURIComponent(authCode)}`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                }
            }
        );


        if(response.ok){

            status.style.display="none";

            button.style.display="none";

            document.getElementById("successMsg")
                .style.display="block";

        }

        else{

            status.innerHTML =
            "❌ Invalid or expired authentication code.";

            button.disabled=false;
            button.innerHTML="✅ Verify Account";

        }


    }

    catch(error){

        console.error(error);

        status.innerHTML =
        "❌ Cannot connect to authentication server.";

        button.disabled=false;
        button.innerHTML="✅ Verify Account";

    }

}

</script>

</body>
</html>
