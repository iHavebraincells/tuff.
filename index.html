<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0d;
      --surface:      #1e1e1e;
      --surface-btn:  #2d2d2d;
      --border:       #333;
      --border-btn:   #444;
      --text-primary: #e0e0e0;
      --text-muted:   #aaaaaa;
      --text-hint:    #555555;
      --font:         system-ui, -apple-system, sans-serif;
      --radius-pill:  40px;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ─── Wordmark ───────────────────────────────────────── */
    .wordmark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 52px;
      color: #ffffff;
      letter-spacing: -1px;
      line-height: 1;
    }

    /* ─── Button bar ─────────────────────────────────────── */
    .bar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 6px 10px;
    }

    .btn-download {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-btn);
      color: var(--text-primary);
      border: 0.5px solid var(--border-btn);
      border-radius: var(--radius-pill);
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      text-decoration: none;
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: transparent;
      color: var(--text-muted);
      border: 0.5px solid var(--border-btn);
      border-radius: 50%;
      cursor: pointer;
      text-decoration: none;
    }

    /* ─── Divider between download buttons ──────────────── */
    .bar-divider {
      width: 0.5px;
      height: 20px;
      background: var(--border-btn);
      flex-shrink: 0;
    }

    .btn-download:hover { background: #383838; }
    .btn-icon:hover     { background: #2a2a2a; color: var(--text-primary); }

    /* ─── Tagline ─────────────────────────────────────────── */
    .tagline {
      color: var(--text-hint);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="hero">

    <!-- Wordmark — edit font/size in .wordmark above -->
    <span class="wordmark">Kalix</span>

    <!-- Button bar -->
    <div class="bar">

      <!-- Download button 1 — change href to your Windows/Mac/Linux release URL -->
      <a href="https://discord.com/oauth2/authorize?client_id=1514327948117672016" class="btn-download">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14M5 12l7 7 7-7"/><path d="M3 20h18"/>
        </svg>
        Raid
      </a>

      <!-- Thin divider between the two download buttons -->
      <div class="bar-divider" aria-hidden="true"></div>

      <!-- Download button 2 — change href to your second release URL (e.g. alternate platform) -->
      <a href="https://discord.com/oauth2/authorize?client_id=1506781654281359420&permissions=8&integration_type=0&scope=bot" class="btn-download">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14M5 12l7 7 7-7"/><path d="M3 20h18"/>
        </svg>
        Nuke
      </a>

      <!-- Discord invite -->
      <a href="https://discord.gg/RZbA7cEXYs" class="btn-icon" aria-label="Join Discord" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
        </svg>
      </a>

    </div>

    <!-- Tagline — edit text here -->
    <p class="tagline">Kalix is completely free and trusted.</p>

  </div>

</body>
</html>
